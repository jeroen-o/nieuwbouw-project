<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Doorverwijzen…</title>
    <script>
      // SPA-fix voor GitHub Pages: stuurt onbekende paden door naar index.html
      // zodat React Router (of toekomstige routes) ze kan afhandelen.
      // Bron: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // /<repo>/  — zet op 0 als je een custom domein gebruikt
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
